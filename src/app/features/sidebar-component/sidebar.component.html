<aside [class.expandida]="expandida()">

  <button type="button" class="toggle-btn" (click)="toggleSidebar()"
          [attr.aria-label]="expandida() ? 'Recolher menu' : 'Expandir menu'">
    <i class="fas" [class.fa-bars]="!expandida()" [class.fa-xmark]="expandida()"></i>
  </button>

  <nav class="nav">
    @for (item of menuItems(); track item.label) {
      @if (item.route) {
        <a class="nav-item" [routerLink]="item.route" routerLinkActive="active">
          <i class="fas {{ item.icon }} nav-icon"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      } @else {
        <span class="nav-item nav-item--disabled" [title]="item.label + ' (em breve)'">
          <i class="fas {{ item.icon }} nav-icon"></i>
          <span class="nav-label">{{ item.label }}</span>
        </span>
      }
    }
  </nav>

  <!-- <button type="button" class="nav-item sair-btn" (click)="sair()">
    <i class="fas fa-right-from-bracket nav-icon"></i>
    <span class="nav-label">Sair</span>
  </button> -->

</aside>
