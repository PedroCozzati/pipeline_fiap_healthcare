# Trajeto Saúde — stack local de microserviços
# Uso: docker compose up --build
#
# Serviços:
#   frontend   → http://localhost:4200
#   gateway    → http://localhost:8000  (API pública para o front)
#   storage    → http://localhost:8001  (GCS + Cloud SQL)
#   prediction → http://localhost:8002  (modelo de risco)

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      API_URL: http://localhost:8000
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - trajeto-net

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STORAGE_SERVICE_URL: http://storage:8001
      PREDICTION_SERVICE_URL: http://prediction:8002
      CORS_ORIGINS: '["http://localhost:4200"]'
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials/gcp-sa.json}:/secrets/gcp-sa.json:ro
    depends_on:
      storage:
        condition: service_healthy
      prediction:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - trajeto-net

  storage:
    build:
      context: ./storage
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials/gcp-sa.json}:/secrets/gcp-sa.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - trajeto-net

  prediction:
    build:
      context: ./prediction
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-sa.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-./credentials/gcp-sa.json}:/secrets/gcp-sa.json:ro
      - ./prediction/artefatos:/app/artefatos:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - trajeto-net

networks:
  trajeto-net:
    driver: bridge
