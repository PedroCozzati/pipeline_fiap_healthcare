<header>
  <div>
    <img class="brand-logo" src="/assets/trajeto-saude-logo-fundo-escuro-1200px-cut.png" alt="Trajeto Saúde" style="height: 50px; width: auto;padding: 7px; ">
  </div>
  <div class="brand-status">
    @if (currentUser(); as usuario) {
     
      <button type="button" class="btn-sair" (click)="sair()" aria-label="Sair">
        <i class="fas fa-right-from-bracket"></i> Sair
      </button>
    }
    <img src="/assets/Logo_SUS.svg.png" alt="Logo SUS" style="height:40px;width:auto;filter:brightness(0) invert(1);" />
  </div>
</header>
