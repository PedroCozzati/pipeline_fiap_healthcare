server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* → Gateway FastAPI :8000 ──────────────────────────────
    # O Angular chama /api/predict, /api/sentinel/query, /api/nearest_ubs, etc.
    # O Nginx remove o prefixo /api e encaminha para o gateway interno.
    location /api/ {
        proxy_pass         http://gateway:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── Angular SPA: redireciona 404 para index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
